# .github/workflows/ci.yml
# Propósito: Verificar que el backend compila y el frontend instala correctamente
# Se ejecuta en cada push y pull request a main

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — lint y compilación
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        working-directory: ./Back
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint con flake8
        working-directory: ./Back
        run: |
          flake8 . --count --max-line-length=120 --exclude=venv,__pycache__ --statistics

      - name: Verificar que la app importa correctamente
        working-directory: ./Back
        env:
          GROQ_API_KEYS: test_key
          DATABASE_URL: sqlite:///./db/test.db
        run: |
          python -c "from main import app; print('Backend OK')"

  frontend:
    name: Frontend — instalación y build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: Front/soft-skills-front/package-lock.json

      - name: Instalar dependencias
        working-directory: ./Front/soft-skills-front
        run: npm install

      - name: Build de producción
        working-directory: ./Front/soft-skills-front
        env:
          REACT_APP_AUTH0_DOMAIN: placeholder.auth0.com
          REACT_APP_AUTH0_CLIENT_ID: placeholder_client_id
          REACT_APP_API_URL: http://localhost:8000
          CI: false
        run: npm run build

  docker:
    name: Docker Compose — verificar configuración
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Verificar docker-compose.yml
        run: docker compose config